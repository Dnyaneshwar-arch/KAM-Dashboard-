<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:#f4f6f9;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.login-box{
    width:400px;
    background:#fff;
    padding:40px;
    border-radius:15px;
    box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

.login-box h2{
    font-size:24px;
    margin-bottom:5px;
}

.login-box p{
    font-size:14px;
    color:#666;
    margin-bottom:25px;
}

label{
    font-size:14px;
}

input{
    width:100%;
    padding:12px;
    margin-top:5px;
    margin-bottom:20px;
    border-radius:8px;
    border:1px solid #ccc;
}

button{
    width:100%;
    padding:12px;
    background:#3a6fd8;
    color:#fff;
    border:none;
    border-radius:8px;
    font-size:14px;
    cursor:pointer;
}

button:hover{
    background:#2f5fc0;
}

.error{
    color:red;
    font-size:13px;
    margin-bottom:15px;
}
</style>
</head>

<body>

<div class="login-box">

    <h2>Welcome Back</h2>
    <p>Sign in to continue</p>

    <div id="errorMsg" class="error"></div>

    <label>Username</label>
    <input type="text" id="username">

    <label>Password</label>
    <input type="password" id="password">

    <button onclick="login()">Sign In</button>

</div>

<script>

// ===== MANUAL USERS (YOU CAN EDIT HERE) =====
const users = {
    "dnyaneshwar@blueoceansteels.com": {
        password: "12345",
        name: "Dnyaneshwar Kumavat"
    },
    "admin@blueoceansteels.com": {
        password: "admin123",
        name: "Admin User"
    }
};

function login(){

    const username = document.getElementById("username").value;
    const password = document.getElementById("password").value;

    if(users[username] && users[username].password === password){

        localStorage.setItem("loggedInUser", users[username].name);
        window.location.href = "index.html";

    } else {
        document.getElementById("errorMsg").innerText = "Invalid username or password";
    }
}

</script>

</body>
</html>
