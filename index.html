<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KAM Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins', sans-serif;
}

body{
    background:#f4f6f9;
    display:flex;
    flex-direction:column;
}

/* ===== TOP BAR ===== */
.topbar{
    height:60px;
    background:#17358A;
    color:white;
    display:flex;
    align-items:center;
    justify-content:flex-end;
    padding:0 30px;
}

.user-info{
    margin-right:20px;
    font-size:14px;
}

.logout-btn{
    background:white;
    color:#3a6fd8;
    border:none;
    padding:6px 12px;
    border-radius:6px;
    cursor:pointer;
    font-size:13px;
}

/* ===== MAIN LAYOUT ===== */
.main{
    display:flex;
    flex:1;
}

/* ===== SIDEBAR ===== */
.sidebar{
    width:240px;
    height:calc(100vh - 60px);
    background:linear-gradient(180deg,#0458AB,#3a6fd8);
    padding:30px 20px;
    color:white;
}

.menu-item{
    font-size:14px;
    padding:10px 12px;
    border-radius:8px;
    margin-bottom:8px;
    cursor:pointer;
}

.menu-item.active{
    background:rgba(255,255,255,0.25);
}

/* ===== CONTENT ===== */
.content{
    flex:1;
    padding:50px;
}

.page-title{
    font-size:24px;
    font-weight:600;
    margin-bottom:40px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:30px;
    max-width:900px;
}

.module-btn{
    padding:16px;
    border-radius:30px;
    border:2px solid #000;
    background:#eaeaea;
    font-size:14px;
    cursor:pointer;
}
.hidden{
    display:none;
}
</style>
</head>

<body>

<div class="topbar">
    <div class="user-info" id="usernameDisplay"></div>
    <button class="logout-btn" onclick="logout()">Logout</button>
</div>

<div class="main">

<div class="sidebar">
    <div class="menu-item active" onclick="showEmployees()">For Employees</div>
    <div class="menu-item" onclick="showManager()">For Manager/Admin</div>
</div>

<div class="content">

<div id="employeeSection">
    <div class="page-title">KAM Module</div>

    <div class="grid">
        <button class="module-btn">Plan Visit</button>
        <button class="module-btn">Plan Collection</button>
        <button class="module-btn">Plan Calls</button>
        <button class="module-btn">Check Visit History</button>
        <button class="module-btn">Check Calls History</button>
        <button class="module-btn">Check Collection History</button>
        <button class="module-btn">Check Sales Details</button>
        <button class="module-btn">Check Leads Data</button>
        <button class="module-btn">Customer History</button>
    </div>
</div>

<div id="managerSection" class="hidden">
    <div class="page-title">Manager / Admin Panel</div>
</div>

</div>
</div>

<script>

// ===== LOGIN CHECK =====
const loggedUser = localStorage.getItem("loggedInUser");

if(!loggedUser){
    window.location.href = "login.html";
} else {
    document.getElementById("usernameDisplay").innerText = loggedUser;
}

// ===== LOGOUT =====
function logout(){
    localStorage.removeItem("loggedInUser");
    window.location.href = "login.html";
}

function showEmployees(){
    document.getElementById("employeeSection").classList.remove("hidden");
    document.getElementById("managerSection").classList.add("hidden");
}

function showManager(){
    document.getElementById("employeeSection").classList.add("hidden");
    document.getElementById("managerSection").classList.remove("hidden");
}

</script>

</body>
</html>
