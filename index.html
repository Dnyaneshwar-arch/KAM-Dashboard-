<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KAM Module</title>

<style>

/* ===== GLOBAL RESET ===== */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

/* ===== BODY ===== */
body {
    background-color: #f3f3f3;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* ===== MAIN CONTAINER ===== */
.main-container {
    width: 95%;
    height: 90vh;
    border: 3px solid black;
    border-radius: 40px;
    display: flex;
    background-color: #f7f7f7;
    padding: 20px;
}

/* ===== LEFT PANEL ===== */
.sidebar {
    width: 250px;
    border: 3px solid black;
    border-radius: 40px;
    padding: 30px 20px;
    background-color: #ffffff;
}

.sidebar h3 {
    margin-bottom: 15px;
}

.highlight {
    background-color: #ffd966;
    padding: 5px 8px;
    border-radius: 5px;
}

/* ===== CONTENT AREA ===== */
.content {
    flex: 1;
    padding: 40px;
    text-align: center;
}

/* ===== HEADER ===== */
.header-box {
    background-color: #9fb3cf;
    padding: 20px;
    font-size: 20px;
    font-weight: bold;
    width: 60%;
    margin: 0 auto 50px auto;
    border: 2px solid #000;
}

/* ===== BUTTON GRID ===== */
.grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 30px;
    width: 80%;
    margin: auto;
}

/* ===== BUTTON STYLE ===== */
.module-btn {
    padding: 18px;
    border-radius: 30px;
    border: 2px solid #4CAF50;
    background-color: #eaeaea;
    font-size: 15px;
    cursor: pointer;
    transition: 0.3s;
}

.module-btn:hover {
    background-color: #d7f5d7;
}

</style>
</head>

<body>

<div class="main-container">

    <!-- LEFT SIDEBAR -->
    <div class="sidebar">
        <h3>KAM (Key Accounts)</h3>
        <p><span class="highlight">For Employees</span></p>
        <p style="margin-top:10px;">For Manager/Admin</p>
    </div>

    <!-- MAIN CONTENT -->
    <div class="content">

        <div class="header-box">
            KAM Module
        </div>

        <div class="grid">

            <button class="module-btn">Plan Visit</button>
            <button class="module-btn">Plan Collection</button>
            <button class="module-btn">Plan Calls</button>

            <button class="module-btn">Check Visit History</button>
            <button class="module-btn">Check Calls History</button>
            <button class="module-btn">Check Collection History</button>

            <button class="module-btn">Check Sales Details</button>
            <button class="module-btn">Check Leads Data</button>
            <button class="module-btn">Customer History</button>

        </div>

    </div>

</div>

</body>
</html>
